<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>💕 纪念日提醒</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #ffe6ee 0%, #fff 30%);
      min-height: 100vh;
      padding-bottom: 100px;
    }
    .header { padding: 40rpx 30rpx 20rpx; }
    .title { font-size: 48rpx; font-weight: bold; color: #ff6b9d; }
    .subtitle { font-size: 28rpx; color: #999; margin-top: 10rpx; }
    .section { padding: 20rpx 30rpx; }
    .section-title { font-size: 32rpx; font-weight: bold; color: #333; margin-bottom: 20rpx; }
    
    .upcoming-scroll { overflow-x: auto; white-space: nowrap; margin-bottom: 20rpx; }
    .upcoming-list { display: inline-flex; gap: 20rpx; }
    .upcoming-card {
      display: inline-block;
      width: 200rpx;
      padding: 30rpx 20rpx;
      background: linear-gradient(135deg, #ff6b9d, #ff9a8b);
      border-radius: 20rpx;
      text-align: center;
      flex-shrink: 0;
    }
    .upcoming-days { font-size: 40rpx; font-weight: bold; color: #fff; display: block; }
    .upcoming-title { font-size: 26rpx; color: #fff; margin-top: 10rpx; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    
    .list { background: #fff; border-radius: 20rpx; overflow: hidden; }
    .item { display: flex; align-items: center; justify-content: space-between; padding: 30rpx; border-bottom: 1rpx solid #f5f5f5; }
    .item-left { display: flex; align-items: center; flex: 1; }
    .item-icon { width: 80rpx; height: 80rpx; background: #ffe6ee; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40rpx; margin-right: 20rpx; }
    .item-info { display: flex; flex-direction: column; }
    .item-title { font-size: 30rpx; color: #333; font-weight: 500; }
    .item-date { font-size: 24rpx; color: #999; margin-top: 6rpx; }
    .delete-btn { font-size: 36rpx; padding: 10rpx; }
    
    .add-btn {
      position: fixed; right: 40rpx; bottom: 60rpx;
      width: 100rpx; height: 100rpx;
      background: linear-gradient(135deg, #ff6b9d, #ff9a8b);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 60rpx; color: #fff;
      box-shadow: 0 10rpx 30rpx rgba(255, 107, 157, 0.4);
    }
    
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100; }
    .modal.show { display: block; }
    .modal-mask { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); }
    .modal-content {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: #fff; border-radius: 30rpx 30rpx 0 0; padding: 30rpx;
      max-height: 80vh; overflow-y: auto;
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30rpx; font-size: 32rpx; font-weight: bold; }
    .modal-close { font-size: 36rpx; color: #999; }
    .form-item { margin-bottom: 24rpx; }
    .form-label { font-size: 28rpx; color: #333; font-weight: 500; display: block; margin-bottom: 16rpx; }
    .form-input { width: 100%; background: #f8f8f8; border-radius: 12rpx; padding: 24rpx; font-size: 28rpx; }
    .form-select { width: 100%; background: #f8f8f8; border-radius: 12rpx; padding: 24rpx; font-size: 28rpx; }
    .type-grid { display: flex; gap: 20rpx; }
    .type-item { flex: 1; padding: 20rpx; border: 2rpx solid #eee; border-radius: 16rpx; text-align: center; font-size: 26rpx; color: #666; }
    .type-item.active { border-color: #ff6b9d; background: #ffe6ee; color: #ff6b9d; }
    .save-btn { background: linear-gradient(135deg, #ff6b9d, #ff9a8b); color: #fff; border: none; border-radius: 50rpx; height: 90rpx; line-height: 90rpx; font-size: 30rpx; margin-top: 30rpx; }
    
    .switch-row { display: flex; justify-content: space-between; align-items: center; }
    .empty { text-align: center; color: #999; padding: 80rpx; }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">❤️ 纪念日提醒</div>
    <div class="subtitle">记录每一个特别的日子</div>
  </div>

  <div class="section" id="upcoming-section" style="display:none;">
    <div class="section-title">🎉 即将到来</div>
    <div class="upcoming-scroll">
      <div class="upcoming-list" id="upcoming-list"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">📅 所有纪念日</div>
    <div class="list" id="anniversary-list">
      <div class="empty" id="empty-tip">还没有纪念日，添加一个吧～</div>
    </div>
  </div>

  <div class="add-btn" onclick="openModal()">+</div>

  <!-- 添加/编辑弹窗 -->
  <div class="modal" id="modal">
    <div class="modal-mask" onclick="closeModal()"></div>
    <div class="modal-content">
      <div class="modal-header">
        <span id="modal-title">添加纪念日</span>
        <span class="modal-close" onclick="closeModal()">✕</span>
      </div>
      
      <div class="form-item">
        <label class="form-label">标题</label>
        <input class="form-input" id="input-title" placeholder="如：结婚纪念日、老婆生日">
      </div>
      
      <div class="form-item">
        <label class="form-label">日期</label>
        <input class="form-input" type="date" id="input-date">
      </div>
      
      <div class="form-item">
        <label class="form-label">类型</label>
        <div class="type-grid">
          <div class="type-item active" data-value="birthday" onclick="selectType(this)">🎂 生日</div>
          <div class="type-item" data-value="anniversary" onclick="selectType(this)">💑 纪念日</div>
          <div class="type-item" data-value="custom" onclick="selectType(this)">📌 自定义</div>
        </div>
      </div>
      
      <div class="form-item">
        <label class="form-label">循环周期</label>
        <select class="form-select" id="input-cycle">
          <option value="yearly">每年</option>
          <option value="monthly">每月</option>
          <option value="weekly">每周</option>
          <option value="daily">每天</option>
        </select>
      </div>
      
      <div class="form-item switch-row">
        <label class="form-label" style="margin:0;">添加到手机日历</label>
        <input type="checkbox" id="input-calendar" checked>
      </div>
      
      <button class="save-btn" onclick="save()">保存</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'anniversaries';
    let editingId = null;
    let selectedType = 'birthday';

    // 加载数据
    function loadData() {
      const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      renderList(data);
      renderUpcoming(data);
    }

    // 渲染列表
    function renderList(data) {
      const list = document.getElementById('anniversary-list');
      if (data.length === 0) {
        list.innerHTML = '<div class="empty">还没有纪念日，添加一个吧～</div>';
        return;
      }
      
      list.innerHTML = data.map(item => `
        <div class="item">
          <div class="item-left" onclick="openModal('${item.id}')">
            <div class="item-icon">${item.type === 'birthday' ? '🎂' : item.type === 'anniversary' ? '💑' : '📌'}</div>
            <div class="item-info">
              <div class="item-title">${item.title}</div>
              <div class="item-date">${item.date} · ${item.cycleText}</div>
            </div>
          </div>
          <div class="delete-btn" onclick="deleteItem('${item.id}')">🗑️</div>
        </div>
      `).join('');
    }

    // 渲染即将到来
    function renderUpcoming(data) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      
      const upcoming = data.map(item => {
        const itemDate = new Date(item.date);
        let thisYear = new Date(today.getFullYear(), itemDate.getMonth(), itemDate.getDate());
        let daysDiff = Math.ceil((thisYear - today) / (1000 * 60 * 60 * 24));
        
        if (daysDiff < 0) {
          if (item.cycle === 'yearly') { thisYear.setFullYear(today.getFullYear() + 1); daysDiff = Math.ceil((thisYear - today) / (1000 * 60 * 60 * 24)); }
          else if (item.cycle === 'monthly') { thisYear.setMonth(today.getMonth() + 1); daysDiff = Math.ceil((thisYear - today) / (1000 * 60 * 60 * 24)); }
          else if (item.cycle === 'weekly') { thisYear.setDate(today.getDate() + 7); daysDiff = Math.ceil((thisYear - today) / (1000 * 60 * 60 * 24)); }
        }
        
        return { ...item, daysDiff };
      }).filter(item => item.daysDiff >= 0 && item.daysDiff <= 30)
        .sort((a, b) => a.daysDiff - b.daysDiff);

      const section = document.getElementById('upcoming-section');
      const list = document.getElementById('upcoming-list');
      
      if (upcoming.length === 0) {
        section.style.display = 'none';
        return;
      }
      
      section.style.display = 'block';
      list.innerHTML = upcoming.map(item => `
        <div class="upcoming-card" onclick="openModal('${item.id}')">
          <span class="upcoming-days">${item.daysDiff}天</span>
          <span class="upcoming-title">${item.title}</span>
        </div>
      `).join('');
    }

    // 打开弹窗
    function openModal(id) {
      editingId = id;
      const modal = document.getElementById('modal');
      document.getElementById('modal-title').textContent = id ? '编辑纪念日' : '添加纪念日';
      
      if (id) {
        const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        const item = data.find(i => i.id === id);
        if (item) {
          document.getElementById('input-title').value = item.title;
          document.getElementById('input-date').value = item.date;
          document.getElementById('input-cycle').value = item.cycle;
          selectedType = item.type;
          updateTypeUI();
        }
      } else {
        document.getElementById('input-title').value = '';
        document.getElementById('input-date').value = '';
        document.getElementById('input-cycle').value = 'yearly';
        selectedType = 'birthday';
        updateTypeUI();
      }
      
      modal.classList.add('show');
    }

    // 关闭弹窗
    function closeModal() {
      document.getElementById('modal').classList.remove('show');
    }

    // 选择类型
    function selectType(el) {
      selectedType = el.dataset.value;
      updateTypeUI();
    }

    function updateTypeUI() {
      document.querySelectorAll('.type-item').forEach(el => {
        el.classList.toggle('active', el.dataset.value === selectedType);
      });
    }

    // 保存
    function save() {
      const title = document.getElementById('input-title').value.trim();
      const date = document.getElementById('input-date').value;
      const cycle = document.getElementById('input-cycle').value;
      const addCalendar = document.getElementById('input-calendar').checked;
      
      if (!title) { alert('请输入标题'); return; }
      if (!date) { alert('请选择日期'); return; }

      const cycleText = { yearly: '每年', monthly: '每月', weekly: '每周', daily: '每天' }[cycle];
      
      let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      
      if (editingId) {
        const index = data.findIndex(i => i.id === editingId);
        if (index !== -1) {
          data[index] = { ...data[index], title, date, cycle, cycleText, type: selectedType };
        }
      } else {
        data.push({
          id: Date.now().toString(),
          title, date, cycle, cycleText, type: selectedType,
          createdAt: new Date().toISOString()
        });
        
        // 添加到日历
        if (addCalendar) {
          addToCalendar(title, date, cycle);
        }
      }
      
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      closeModal();
      loadData();
      alert('保存成功');
    }

    // 删除
    function deleteItem(id) {
      if (!confirm('确定删除吗？')) return;
      let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      data = data.filter(i => i.id !== id);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      loadData();
    }

    // 添加到日历 (生成 ICS 文件)
    function addToCalendar(title, date, cycle) {
      const [year, month, day] = date.split('-').map(Number);
      const freq = { daily: 'DAILY', weekly: 'WEEKLY', monthly: 'MONTHLY', yearly: 'YEARLY' }[cycle] || 'YEARLY';
      
      const now = new Date();
      let eventDate = new Date(year, month - 1, day, 9, 0, 0);
      if (eventDate <= now) {
        if (cycle === 'yearly') eventDate.setFullYear(now.getFullYear() + 1);
        else if (cycle === 'monthly') eventDate.setMonth(now.getMonth() + 1);
        else if (cycle === 'weekly') eventDate.setDate(now.getDate() + 7);
      }
      
      const format = d => `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}T${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}00`;
      
      const ics = [
        'BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//Anniversary//EN',
        'BEGIN:VEVENT',
        `DTSTART;TZID=Asia/Shanghai:${format(eventDate)}`,
        `DTEND;TZID=Asia/Shanghai:${format(new Date(eventDate.getTime()+3600000))}`,
        `RRULE:FREQ=${freq}`,
        `SUMMARY:${title}`,
        `UID:anniversary-${Date.now()}`,
        'BEGIN:VALARM', 'TRIGGER:-PT30M', 'ACTION:DISPLAY', 'DESCRIPTION:30分钟后提醒',
        'END:VALARM', 'END:VEVENT', 'END:VCALENDAR'
      ].join('\r\n');
      
      const blob = new Blob([ics], { type: 'text/calendar' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${title}.ics`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // 初始化
    loadData();
  </script>
</body>
</html>
